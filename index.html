<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Tracker</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <header>
    <h1>📊 Project Tracker</h1>
    <button id="googleSignIn">Sign in with Google</button>
  </header>

  <main>
    <!-- Form Project -->
    <section>
      <h2>Tambah Project</h2>
      <form id="projectForm">
        <input type="text" id="projectName" placeholder="Nama Project" required>
        <input type="text" id="projectDesc" placeholder="Deskripsi" required>
        <input type="date" id="projectDeadline" required>
        <button type="submit">Simpan Project</button>
      </form>
    </section>

    <!-- Form Progress -->
    <section>
      <h2>Tambah Progress</h2>
      <form id="progressForm">
        <input type="date" id="progressDate" required>
        <input type="text" id="progressStatus" placeholder="Status" required>
        <textarea id="progressNotes" placeholder="Catatan"></textarea>
        <button type="submit">Simpan Progress</button>
      </form>
    </section>

    <!-- Tabel Progress -->
    <section>
      <h2>Daftar Progress</h2>
      <table id="progressTable">
        <thead>
          <tr>
            <th>Tanggal</th>
            <th>Status</th>
            <th>Catatan</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <button id="exportJson">Export JSON</button>
  </main>

  <!-- Firebase CDN -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <!-- Config & App -->
  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
