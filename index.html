<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Tracker</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <header>
    <h1>📊 Project Tracker</h1>
    <button id="settingsBtn">⚙️ Pengaturan</button>
  </header>

  <main>
    <!-- Tabel Project -->
    <section>
      <h2>Daftar Project</h2>
      <table id="projectTable">
        <thead>
          <tr>
            <th>Nama</th>
            <th>Status</th>
            <th>Tanggal Buat</th>
            <th>Deadline</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <!-- Modal Pengaturan -->
  <div id="settingsModal" class="modal">
    <div class="modal-content">
      <span id="closeModal">&times;</span>
      <h2>Tambah/Edit Project</h2>
      <form id="settingsForm">
        <input type="text" id="projectName" placeholder="Nama Project" required>
        <input type="text" id="projectStatus" placeholder="Status" required>
        <input type="date" id="projectCreated" required>
        <input type="date" id="projectDeadline" required>
        <button type="submit">Simpan</button>
      </form>
    </div>
  </div>

  <!-- Firebase CDN -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <!-- Config & App -->
  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
